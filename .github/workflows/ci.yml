# Copyright 2026 Query Farm LLC - https://query.farm
#
# Unit tests (`cargo test`) + the sqllogictest extension suite (test/sql/*.test)
# run against the easter worker through the real signed `vgi` DuckDB community
# extension via a prebuilt standalone `haybarn-unittest`. Both jobs run on
# Linux, macOS, and Windows. See ci/README.md for the design.
#
# Reusable (workflow_call) so a release workflow can gate on a green run.
name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Resolve the latest published haybarn release once, so the whole matrix tests
  # the same version (and we never hardcode/pin it).
  resolve-haybarn:
    runs-on: ubuntu-latest
    outputs:
      release: ${{ steps.r.outputs.release }}
    steps:
      - id: r
        run: |
          REL=$(gh release view --repo Query-farm-haybarn/haybarn --json tagName --jq .tagName)
          echo "release=$REL" >> "$GITHUB_OUTPUT"
          echo "Latest haybarn release: $REL"
        env:
          GH_TOKEN: ${{ github.token }}

  unit:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release --locked
      - name: Run unit tests
        run: cargo test --locked

  integration:
    needs: resolve-haybarn
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  asset: haybarn_unittest-linux-amd64.zip,   exe: vgi-easter }
          - { os: macos-latest,   asset: haybarn_unittest-osx-arm64.zip,     exe: vgi-easter }
          - { os: windows-latest, asset: haybarn_unittest-windows-amd64.zip, exe: vgi-easter.exe }
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        # Git Bash on Windows; the integration runner is a bash script.
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build the easter worker (release)
        run: cargo build --release --locked

      - name: Download haybarn-unittest
        run: |
          gh release download "$HAYBARN_RELEASE" \
            --repo Query-farm-haybarn/haybarn \
            --pattern '${{ matrix.asset }}' \
            --output haybarn-unittest.zip --clobber
          mkdir -p hb && unzip -o -q haybarn-unittest.zip -d hb
        env:
          GH_TOKEN: ${{ github.token }}
          HAYBARN_RELEASE: ${{ needs.resolve-haybarn.outputs.release }}

      - name: Resolve runner + worker paths
        run: |
          # Absolute paths: run-integration.sh cd's into a staging dir before
          # invoking the runner, so relative paths would not resolve. The worker
          # LOCATION is consumed by the (native) extension process, so on Windows
          # it must be a native path to the .exe.
          if [ "$RUNNER_OS" = "Windows" ]; then
            UNITTEST="$PWD/$(find hb -name 'haybarn-unittest.exe' -type f | head -1)"
            WORKER=$(cygpath -w "$PWD/target/release/${{ matrix.exe }}")
          else
            UNITTEST="$PWD/$(find hb -name 'haybarn-unittest' -type f | head -1)"
            chmod +x "$UNITTEST"
            WORKER="$PWD/target/release/${{ matrix.exe }}"
          fi
          echo "HAYBARN_UNITTEST=$UNITTEST" >> "$GITHUB_ENV"
          echo "VGI_EASTER_WORKER=$WORKER" >> "$GITHUB_ENV"

      - name: Run extension integration suite
        run: ci/run-integration.sh
